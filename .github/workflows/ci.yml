name: OmniPM CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - run: npm ci
      
      # F20: Lockfile integrity check
      - name: Verify lockfile
        run: |
          npm ci --dry-run 2>&1 | grep -q "up to date" || echo "⚠️ Lockfile may be outdated"
      
      # F19: Security audit
      - name: npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      # F27: Extension integrity checksum
      - name: Source integrity check
        run: node vitest run source-integrity
      
      # Run all tests
      - name: Vitest
        run: npm test
      
      # F24: E2E smoke test (minimal DAG lifecycle)
      - name: E2E Smoke
        run: node scripts/smoke-test.mjs
